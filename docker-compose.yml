services:
  main-app:
    container_name: agenda-pro-main
    build: ./Agenda-Pro-Main
    depends_on:
      database_java:
        condition: service_healthy
    ports: 
      - 8080:8080
    volumes:
      - ./Agenda-Pro-Main:/app
    networks:
        - agendaprojava

  database_java:
    container_name: db-agenda-pro-java
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: agenda
    ports:
      - 5432:5432
    volumes:
      - postgres:/var/lib/postgresql/data
      - ./Agenda-Pro-Main/dump.sql:/docker-entrypoint-initdb.d/dump.sql
    networks:
        - agendaprojava
    healthcheck:
        test: ["CMD-SHELL", "pg_isready -U postgres"]
        interval: 5s
        timeout: 5s
        retries: 5

volumes:
  postgres:

networks:
  agendaprojava:
